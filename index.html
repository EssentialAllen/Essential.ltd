<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/en/">
    <title>Redirecting...</title>
    <script>
        // Simple language detection redirect
        const userLang = navigator.language || navigator.userLanguage; 
        if(userLang.startsWith('zh')) {
            window.location.href = '/zh/';
        } else {
            window.location.href = '/en/';
        }
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="/en/">click here for English</a> or <a href="/zh/">这里访问中文版</a>.</p>
</body>
</html>
