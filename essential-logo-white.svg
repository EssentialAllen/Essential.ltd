<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="1000" height="120">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
            .logo {
                font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
                font-weight: 600;
                font-size: 72px;
                letter-spacing: -0.025em;
                fill: #ffffff;
            }
        </style>
    </defs>
    <text x="20" y="85" class="logo">ESSENTIAL</text>
    <!-- Perfectly aligned vertical rectangle for | matching Chinese character height -->
    <rect x="382" y="27" width="3" height="60" fill="#ffffff" />
    <text x="412" y="85" class="logo">本质</text>
</svg>
